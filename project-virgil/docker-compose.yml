version: '3.8'

services:
  backend:
    image: leofrancia08489/project-virgil-backend:v1.8.0
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-21-openjdk-arm64
    volumes:
      - ./backend/jdbc:/app/jdbc
      - ./backend/documents:/app/documents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: leofrancia08489/project-virgil-frontend:v1.8.0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped

networks:
  default:
    name: project-virgil-network
