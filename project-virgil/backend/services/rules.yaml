  - id: EFF-004
    name: Flow Designer Underutilized
    description: >
      Flow Designer is installed but has fewer flows than legacy workflows.
      Modern automation capabilities are underutilized.
    source: best_practice
    severity: low
    category: efficiency
    condition_description: >
      Flow Designer plugin is active but sys_hub_flow count is less than
      half of wf_workflow count
    recommendation: >
      Prioritize new automations in Flow Designer over Legacy Workflow.
      Flow Designer supports Integration Hub actions, error policies, and
      parallel execution. Plan a migration roadmap for legacy workflows
      starting with the most frequently triggered ones.
    tags: [efficiency, flow_designer, workflow, modernization]
    eval:
      all:
        - node_active: flow_designer
        - table_gt: {table: sys_hub_flow, value: 0}
        - table_gt: {table: wf_workflow, value: 0}
        - table_ratio_below: {table: sys_hub_flow, other: wf_workflow, ratio: 0.5}
    message: "Flow Designer has {sys_hub_flow_count} flows vs {wf_workflow_count} legacy workflows. Modern automation underutilized."
    recommended_nodes:
      flow_designer: "modern automation"
